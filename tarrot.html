<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타로 리딩</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: #e9d5ff;
        }

        /* 배경 효과 */
        body::before {
            content: ''; position: fixed; top: 0; left: 25%; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            filter: blur(80px); z-index: -1; animation: float 8s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-30px); } }

        .container {
            max-width: 1000px;
            width: 95%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 { font-size: 2.2em; letter-spacing: 4px; margin-bottom: 10px; color: #fbcfe8; }
        .subtitle { color: #a855f7; font-size: 1em; margin-bottom: 30px; opacity: 0.8; }

        /* --- 자연스럽게 겹치는 부채꼴 뷰포트 --- */
        .cards-fan-viewport {
            width: 100%;
            height: 350px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 20px 100px; /* 양옆 여백으로 중앙 집중도 향상 */
            cursor: grab;
            scrollbar-width: none; /* 파이어폭스 스크롤 숨김 */
        }
        .cards-fan-viewport::-webkit-scrollbar { display: none; } /* 크롬 스크롤 숨김 */

        .cards-fan-inner {
            display: inline-flex;
            align-items: flex-end;
            padding-bottom: 50px;
            /* 카드 78장이 촘촘하게 겹치도록 간격 조정 */
            gap: -45px; 
            position: relative;
        }

        .card-wrapper {
            display: inline-block;
            position: relative;
            /* 앞뒤 카드 겹침을 위해 마이너스 마진 활용 */
            margin-left: -50px; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-wrapper:first-child { margin-left: 0; }

        .card-button {
            width: 85px;
            height: 135px;
            background: linear-gradient(145deg, #6d28d9, #db2777);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        /* 호버 시 튀어나오는 연출 */
        .card-wrapper:hover {
            z-index: 1000 !important;
            transform: translateY(-50px) rotate(5deg) scale(1.1);
        }
        .card-wrapper:hover .card-button {
            border-color: #fbcfe8;
            color: #fff;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.6);
        }

        .card-button:disabled {
            opacity: 0.1;
            transform: translateY(100px);
            pointer-events: none;
        }

        /* 결과 화면 디자인 */
        .result-display {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px;
            margin: 20px 0;
            scrollbar-width: thin;
        }

        .result-card {
            min-width: 160px;
            background: rgba(30, 27, 75, 0.5);
            border: 1px solid #a855f7;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-text {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            text-align: left;
            font-size: 0.9em;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(168, 85, 247, 0.2);
            margin: 20px 0;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #ec4899); color: white; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #cbd5e1; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .stage { display: none; }
        .stage.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Stage 1 -->
        <div class="stage active" id="stage-intro">
            <h1>✨ MYSTIC TAROT ✨</h1>
            <p class="subtitle">마음을 가다듬고 카드를 펼쳐보세요</p>
            <button class="btn btn-primary" onclick="startShuffle()">카드 섞기</button>
        </div>

        <!-- Stage 2 -->
        <div class="stage" id="stage-select">
            <p id="counter" style="color:#fbcfe8; font-weight:bold; margin-bottom:10px;">카드를 선택하세요</p>
            <div class="cards-fan-viewport" id="viewport">
                <div class="cards-fan-inner" id="cards-fan"></div>
            </div>
            <div>
                <button class="btn btn-primary" onclick="showResult()" id="res-btn" style="display:none">결과 확인</button>
                <button class="btn btn-secondary" onclick="resetAll()">다시 하기</button>
            </div>
        </div>

        <!-- Stage 3 -->
        <div class="stage" id="stage-result">
            <div class="result-display" id="result-display"></div>
            <div class="result-text" id="result-text"></div>
            <button class="btn btn-primary" onclick="copyToClipboard()">결과 복사</button>
            <button class="btn btn-secondary" onclick="resetAll()">처음으로</button>
        </div>
    </div>

    <script>
        const TAROT_CARDS = [
            { name: '광대 (The Fool)', meaning: '새로운 시작, 자유' },
            { name: '마술사 (The Magician)', meaning: '창조력, 자신감' },
            { name: '여사제 (The High Priestess)', meaning: '직관, 지혜' },
            { name: '황후 (The Empress)', meaning: '풍요, 모성애' },
            { name: '황제 (The Emperor)', meaning: '권위, 질서' },
            { name: '교황 (The Hierophant)', meaning: '전통, 가르침' },
            { name: '연인들 (The Lovers)', meaning: '사랑, 선택' },
            { name: '전차 (The Chariot)', meaning: '승리, 전진' },
            { name: '힘 (Strength)', meaning: '인내, 내면의 힘' },
            { name: '은둔자 (The Hermit)', meaning: '성찰, 고독' },
            { name: '운명의 수레바퀴', meaning: '운명적 변화' },
            { name: '정의 (Justice)', meaning: '균형, 공정' },
            { name: '매달린 남자', meaning: '새로운 시각, 희생' },
            { name: '죽음 (Death)', meaning: '종결과 새로운 시작' },
            { name: '절제 (Temperance)', meaning: '조화, 중용' },
            { name: '악마 (The Devil)', meaning: '유혹, 속박' },
            { name: '탑 (The Tower)', meaning: '갑작스러운 변화' },
            { name: '별 (The Star)', meaning: '희망, 영감' },
            { name: '달 (The Moon)', meaning: '불안, 직관' },
            { name: '해 (The Sun)', meaning: '성공, 활력' },
            { name: '심판 (Judgement)', meaning: '부활, 결단' },
            { name: '세상 (The World)', meaning: '완성, 성취' }
        ];

        // 78장 구성을 위해 마이너 카드 데이터 자동 생성 (실제 사용 시 데이터 교체 가능)
        const suits = ['Wands', 'Cups', 'Swords', 'Pentacles'];
        const nums = ['Ace', '2', '3', '4', '5', '6', '7', '8', '9', '10', 'Page', 'Knight', 'Queen', 'King'];
        suits.forEach(s => nums.forEach(n => TAROT_CARDS.push({ name: `${s} ${n}`, meaning: '카드의 상세한 의미를 탐색해보세요.' })));

        let state = { selectedCards: [], shuffledDeck: [] };

        function startShuffle() {
            state.shuffledDeck = [...TAROT_CARDS].sort(() => Math.random() - 0.5);
            state.selectedCards = [];
            renderFan();
            showStage('stage-select');
        }

        function renderFan() {
            const fan = document.getElementById('cards-fan');
            fan.innerHTML = '';
            
            state.shuffledDeck.forEach((card, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                
                // 부채꼴 각도 조절 (중앙 기준 좁게)
                const angle = (idx - 39) * 1.5; 
                wrapper.style.transform = `rotate(${angle}deg)`;
                wrapper.style.zIndex = idx;

                const btn = document.createElement('button');
                btn.className = 'card-button';
                btn.innerHTML = '✨';
                btn.onclick = () => selectCard(idx, btn);
                
                wrapper.appendChild(btn);
                fan.appendChild(wrapper);
            });
        }

        function selectCard(idx, btn) {
            const card = state.shuffledDeck[idx];
            const isReversed = Math.random() > 0.5;
            state.selectedCards.push({ ...card, reversed: isReversed });
            
            btn.disabled = true;
            document.getElementById('counter').innerText = `${state.selectedCards.length}개의 카드를 뽑았습니다.`;
            document.getElementById('res-btn').style.display = 'inline-block';
        }

        function showResult() {
            const display = document.getElementById('result-display');
            display.innerHTML = '';
            let text = "🔮 [타로 리딩 결과]\n";

            state.selectedCards.forEach((c, i) => {
                const dir = c.reversed ? '역방향' : '정방향';
                const cardDiv = document.createElement('div');
                cardDiv.className = 'result-card';
                cardDiv.innerHTML = `<div style="font-size:0.8em; color:#a855f7">#${i+1}</div>
                                     <div style="margin:10px 0; font-weight:bold">${c.name}</div>
                                     <div style="font-size:0.8em; color:#fbcfe8">${dir}</div>`;
                display.appendChild(cardDiv);
                text += `${i+1}. ${c.name} (${dir})\n`;
            });

            document.getElementById('result-text').innerText = text + "\n이 결과를 바탕으로 나의 상황을 리딩해줘!";
            showStage('stage-result');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('result-text').innerText);
            alert('복사되었습니다!');
        }

        function resetAll() {
            showStage('stage-intro');
            document.getElementById('res-btn').style.display = 'none';
        }

        function showStage(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 마우스 드래그 스크롤 기능
        const slider = document.getElementById('viewport');
        let isDown = false; let startX; let scrollLeft;
        slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - slider.offsetLeft; const walk = (x - startX) * 2; slider.scrollLeft = scrollLeft - walk; });
    </script>
</body>
</html>
