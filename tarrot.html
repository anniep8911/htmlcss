<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신비로운 타로 리딩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Malgun Gothic', serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden; /* 부채꼴 확산을 위해 스크롤 방지 */
            color: #e9d5ff;
        }

        /* 배경 효과 */
        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            pointer-events: none;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -40px); }
        }

        .container {
            max-width: 1200px;
            width: 95%;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #e9d5ff 0%, #fbcfe8 50%, #e9d5ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        /* --- 카드 부채꼴 배치 핵심 CSS --- */
        .tarot-fan-container {
            position: relative;
            height: 450px;
            margin: 50px 0;
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .card-wrapper {
            position: absolute;
            bottom: 50px;
            transform-origin: center 500px; /* 부채꼴 회전축을 아래로 길게 설정 */
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }

        .card-inner {
            width: 80px;
            height: 130px;
            background: linear-gradient(145deg, #4c1d95, #7c3aed);
            border: 2px solid rgba(216, 180, 254, 0.4);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            color: rgba(255, 255, 255, 0.2);
            font-size: 1.2em;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        /* 카드 뒷면 문양 */
        .card-inner::after {
            content: '✨';
            font-size: 1.5em;
        }

        .card-wrapper:hover {
            z-index: 100 !important;
        }

        .card-wrapper:hover .card-inner {
            transform: translateY(-30px);
            border-color: #fbcfe8;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
            color: #fff;
        }

        .card-wrapper.selected {
            pointer-events: none;
            opacity: 0;
            transform: translateY(-100px) scale(0.5) !important;
        }

        /* --- 스테이지 관리 --- */
        .stage { display: none; animation: fadeIn 0.8s ease; }
        .stage.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- 결과창 디자인 --- */
        .result-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .result-card {
            background: rgba(30, 27, 75, 0.6);
            border: 1px solid #a855f7;
            padding: 20px;
            border-radius: 15px;
            width: 200px;
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
        }

        .result-card:hover { transform: translateY(-10px); }

        .card-img-placeholder {
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom, #2d1b4e, #1e1b4b);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
        }

        .result-text {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            font-size: 0.9em;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
        }

        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(168, 85, 247, 0.6); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .selected-count {
            color: #fbcfe8;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-glow" style="top: 10%; left: 10%;"></div>
    <div class="bg-glow" style="bottom: 10%; right: 10%; animation-delay: -5s;"></div>

    <div class="container">
        <!-- Stage 1: Intro -->
        <div class="stage active" id="stage-intro">
            <h1>TAROT READING</h1>
            <p style="margin-bottom: 30px; color: #c084fc;">당신의 운명이 담긴 카드를 펼칩니다</p>
            <button class="btn btn-primary" onclick="startShuffle()">카드를 셔플합니다</button>
        </div>

        <!-- Stage 2: Selection (Fan Animation) -->
        <div class="stage" id="stage-select">
            <div class="selected-count">선택된 카드: <span id="count">0</span> / 3</div>
            <div class="tarot-fan-container" id="fan-container">
                <!-- JS로 카드가 부채꼴로 생성됨 -->
            </div>
            <div id="select-controls">
                <button class="btn btn-primary" id="confirm-btn" onclick="showResult()" style="display:none">리딩 결과 보기</button>
                <button class="btn btn-secondary" onclick="resetAll()">다시 셔플</button>
            </div>
        </div>

        <!-- Stage 3: Result -->
        <div class="stage" id="stage-result">
            <h2>리딩 결과</h2>
            <div class="result-display" id="result-display"></div>
            <div class="result-text" id="result-text"></div>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="copyToClipboard()">결과 복사하기</button>
                <button class="btn btn-secondary" onclick="resetAll()">다시 하기</button>
            </div>
        </div>
    </div>

    <script>
        const TAROT_CARDS = [
            { id: 0, name: '광대 (The Fool)', meaning: '새로운 시작, 모험, 순수함' },
            { id: 1, name: '마술사 (The Magician)', meaning: '능력, 재능, 창조력' },
            { id: 2, name: '여사제 (The High Priestess)', meaning: '직관, 신비, 내면의 지혜' },
            { id: 3, name: '황후 (The Empress)', meaning: '풍요, 창조성, 모성' },
            { id: 4, name: '황제 (The Emperor)', meaning: '권위, 구조, 리더십' },
            { id: 5, name: '교황 (The Hierophant)', meaning: '전통, 영성, 지식' },
            { id: 6, name: '연인들 (The Lovers)', meaning: '사랑, 선택, 관계' },
            { id: 7, name: '전차 (The Chariot)', meaning: '의지, 통제, 승리' },
            { id: 8, name: '힘 (Strength)', meaning: '내적 강함, 인내, 자신감' },
            { id: 9, name: '은둔자 (The Hermit)', meaning: '명상, 성찰, 진리 추구' },
            { id: 10, name: '운명의 수레바퀴 (Wheel of Fortune)', meaning: '순환, 운명, 변화' },
            { id: 11, name: '정의 (Justice)', meaning: '균형, 공정, 인과응보' },
            { id: 12, name: '매달린 남자 (The Hanged Man)', meaning: '희생, 관점 변화, 멈춤' },
            { id: 13, name: '죽음 (Death)', meaning: '변환, 끝과 시작, 전환' },
            { id: 14, name: '절제 (Temperance)', meaning: '조화, 균형, 절제' },
            { id: 15, name: '악마 (The Devil)', meaning: '속박, 물질주의, 제약' },
            { id: 16, name: '탑 (The Tower)', meaning: '파괴, 급격한 변화, 깨달음' },
            { id: 17, name: '별 (The Star)', meaning: '희망, 영감, 명확성' },
            { id: 18, name: '달 (The Moon)', meaning: '환상, 무의식, 직관' },
            { id: 19, name: '해 (The Sun)', meaning: '성공, 기쁨, 명확함' },
            { id: 20, name: '심판 (Judgement)', meaning: '재평가, 소명, 깨어남' },
            { id: 21, name: '세상 (The World)', meaning: '완성, 성취, 새로운 순환' },
            // ... (데이터가 많으므로 주요 메이저 카드 위주로 예시 유지, 실제 데이터는 그대로 사용 가능)
        ];

        let state = {
            selectedCards: [],
            shuffledDeck: []
        };

        function startShuffle() {
            state.shuffledDeck = [...TAROT_CARDS].sort(() => Math.random() - 0.5).slice(0, 22); // 부채꼴 표현을 위해 22장 사용
            state.selectedCards = [];
            document.getElementById('count').textContent = '0';
            document.getElementById('confirm-btn').style.display = 'none';
            
            createFanCards();
            showStage('stage-select');
        }

        function createFanCards() {
            const container = document.getElementById('fan-container');
            container.innerHTML = '';
            
            const totalCards = state.shuffledDeck.length;
            const angleStep = 160 / (totalCards - 1); // 160도 범위 내에서 분산

            state.shuffledDeck.forEach((card, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                
                // 부채꼴 계산
                const angle = -80 + (i * angleStep);
                wrapper.style.transform = `rotate(${angle}deg)`;
                wrapper.style.zIndex = i;

                wrapper.innerHTML = `<div class="card-inner">${i+1}</div>`;
                
                wrapper.onclick = () => {
                    if (state.selectedCards.length < 3) {
                        selectCard(wrapper, card);
                    }
                };

                container.appendChild(wrapper);
            });
        }

        function selectCard(element, cardData) {
            element.classList.add('selected');
            
            const isReversed = Math.random() > 0.5;
            state.selectedCards.push({
                ...cardData,
                reversed: isReversed
            });

            document.getElementById('count').textContent = state.selectedCards.length;

            if (state.selectedCards.length >= 1) {
                document.getElementById('confirm-btn').style.display = 'inline-block';
            }
        }

        function showResult() {
            const display = document.getElementById('result-display');
            display.innerHTML = '';
            
            let textOutput = "🔮 [나의 타로 리딩 결과]\n\n";

            state.selectedCards.forEach((card, i) => {
                const dirStr = card.reversed ? '역방향 🔄' : '정방향 ✓';
                
                const cardDiv = document.createElement('div');
                cardDiv.className = 'result-card';
                cardDiv.innerHTML = `
                    <div class="card-img-placeholder">${card.reversed ? '🙃' : '✨'}</div>
                    <h3 style="color:#fbcfe8">#${i+1} ${card.name}</h3>
                    <p style="margin:10px 0; font-weight:bold;">${dirStr}</p>
                    <p style="font-size:0.8em; color:#d8b4fe">${card.meaning}</p>
                `;
                display.appendChild(cardDiv);

                textOutput += `${i+1}번 카드: ${card.name} (${dirStr})\n- 의미: ${card.meaning}\n\n`;
            });

            textOutput += "위 내용을 바탕으로 나의 상황을 분석해줘!";
            document.getElementById('result-text').innerText = textOutput;
            showStage('stage-result');
        }

        function copyToClipboard() {
            const text = document.getElementById('result-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('결과가 복사되었습니다! 채팅창에 붙여넣어주세요.');
            });
        }

        function resetAll() {
            showStage('stage-intro');
        }

        function showStage(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
