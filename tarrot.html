<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타로 리딩</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: #e9d5ff;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 25%; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            filter: blur(80px); z-index: -1; animation: float 8s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-30px); } }

        .container {
            max-width: 1000px;
            width: 95%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 { font-size: 2.2em; letter-spacing: 4px; margin-bottom: 10px; color: #fbcfe8; }
        .subtitle { color: #a855f7; font-size: 1em; margin-bottom: 30px; opacity: 0.8; }

        /* --- 일자 카드 뷰포트 --- */
        .cards-deck-viewport {
            width: 100%;
            height: 250px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 40px 60px;
            cursor: grab;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .cards-deck-viewport::-webkit-scrollbar { display: none; }

        .cards-deck-inner {
            display: inline-flex;
            align-items: center;
            padding-right: 50px; /* 마지막 카드 여유 공간 */
        }

        .card-wrapper {
            display: inline-block;
            /* 카드가 겹치는 간격 */
            margin-right: -55px; 
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .card-button {
            width: 85px;
            height: 135px;
            background: linear-gradient(145deg, #6d28d9, #db2777);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            position: relative;
            overflow: hidden;
        }

        /* 호버 시 튀어나오는 연출 (일자 버전) */
        .card-wrapper:hover {
            z-index: 1000 !important;
            transform: translateY(-30px);
            margin-right: -30px; /* 호버 시 공간 확보 */
            margin-left: 25px;
        }
        .card-wrapper:hover .card-button {
            border-color: #fbcfe8;
            color: #fff;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.6);
            transform: scale(1.1);
        }

        .card-button:disabled {
            opacity: 0;
            transform: translateY(100px);
            pointer-events: none;
        }

        /* 결과 창 디자인 */
        .result-display {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px;
            margin: 20px 0;
            scrollbar-width: thin;
            scrollbar-color: #a855f7 transparent;
        }

        .result-card {
            min-width: 150px;
            background: rgba(30, 27, 75, 0.5);
            border: 1px solid #a855f7;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .result-text {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            text-align: left;
            font-size: 0.9em;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(168, 85, 247, 0.2);
            margin: 20px 0;
            white-space: pre-wrap;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, #a855f7, #ec4899); color: white; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #cbd5e1; }

        .stage { display: none; }
        .stage.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Stage 1 -->
        <div class="stage active" id="stage-intro">
            <h1>✨ MYSTIC TAROT ✨</h1>
            <p class="subtitle">마음을 가다듬고 카드를 뽑으세요</p>
            <button class="btn btn-primary" onclick="startShuffle()">카드 셔플하기</button>
        </div>

        <!-- Stage 2 -->
        <div class="stage" id="stage-select">
            <p id="counter" style="color:#fbcfe8; font-weight:bold; margin-bottom:10px;">원하는 만큼 카드를 클릭하세요</p>
            <div class="cards-deck-viewport" id="viewport">
                <div class="cards-deck-inner" id="cards-deck"></div>
            </div>
            <div>
                <button class="btn btn-primary" onclick="showResult()" id="res-btn" style="display:none">결과 확인하기</button>
                <button class="btn btn-secondary" onclick="resetAll()">다시 하기</button>
            </div>
        </div>

        <!-- Stage 3 -->
        <div class="stage" id="stage-result">
            <div class="result-display" id="result-display"></div>
            <div class="result-text" id="result-text"></div>
            <button class="btn btn-primary" onclick="copyToClipboard()">결과 복사</button>
            <button class="btn btn-secondary" onclick="resetAll()">처음으로</button>
        </div>
    </div>

    <script>
        const TAROT_CARDS = [
            { name: '광대 (The Fool)', meaning: '새로운 시작, 자유' },
            { name: '마술사 (The Magician)', meaning: '창조력, 자신감' },
            { name: '여사제 (The High Priestess)', meaning: '직관, 지혜' },
            { name: '황후 (The Empress)', meaning: '풍요, 모성애' },
            { name: '황제 (The Emperor)', meaning: '권위, 질서' },
            { name: '교황 (The Hierophant)', meaning: '전통, 가르침' },
            { name: '연인들 (The Lovers)', meaning: '사랑, 선택' },
            { name: '전차 (The Chariot)', meaning: '승리, 전진' },
            { name: '힘 (Strength)', meaning: '인내, 내면의 힘' },
            { name: '은둔자 (The Hermit)', meaning: '성찰, 고독' },
            { name: '운명의 수레바퀴', meaning: '운명적 변화' },
            { name: '정의 (Justice)', meaning: '균형, 공정' },
            { name: '매달린 남자', meaning: '새로운 시각, 희생' },
            { name: '죽음 (Death)', meaning: '종결과 새로운 시작' },
            { name: '절제 (Temperance)', meaning: '조화, 중용' },
            { name: '악마 (The Devil)', meaning: '유혹, 속박' },
            { name: '탑 (The Tower)', meaning: '갑작스러운 변화' },
            { name: '별 (The Star)', meaning: '희망, 영감' },
            { name: '달 (The Moon)', meaning: '불안, 직관' },
            { name: '해 (The Sun)', meaning: '성공, 활력' },
            { name: '심판 (Judgement)', meaning: '부활, 결단' },
            { name: '세상 (The World)', meaning: '완성, 성취' }
        ];

        // 78장 구성을 위해 마이너 카드 생성 (사용자 원본 로직 유지)
        const suits = ['Wands', 'Cups', 'Swords', 'Pentacles'];
        const nums = ['Ace', '2', '3', '4', '5', '6', '7', '8', '9', '10', 'Page', 'Knight', 'Queen', 'King'];
        suits.forEach(s => nums.forEach(n => TAROT_CARDS.push({ name: `${s} ${n}`, meaning: '상세 의미를 탐색하세요.' })));

        let state = { selectedCards: [], shuffledDeck: [] };

        function startShuffle() {
            state.shuffledDeck = [...TAROT_CARDS].sort(() => Math.random() - 0.5);
            state.selectedCards = [];
            renderDeck();
            showStage('stage-select');
        }

        function renderDeck() {
            const deck = document.getElementById('cards-deck');
            deck.innerHTML = '';
            
            state.shuffledDeck.forEach((card, idx) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.style.zIndex = idx;

                const btn = document.createElement('button');
                btn.className = 'card-button';
                btn.innerHTML = '✨';
                btn.onclick = () => selectCard(idx, btn);
                
                wrapper.appendChild(btn);
                deck.appendChild(wrapper);
            });
        }

        function selectCard(idx, btn) {
            const card = state.shuffledDeck[idx];
            const isReversed = Math.random() > 0.5;
            state.selectedCards.push({ ...card, reversed: isReversed });
            
            btn.disabled = true;
            document.getElementById('counter').innerText = `${state.selectedCards.length}장의 카드를 선택했습니다.`;
            document.getElementById('res-btn').style.display = 'inline-block';
        }

        function showResult() {
            const display = document.getElementById('result-display');
            display.innerHTML = '';
            let text = "📋 [타로 리딩 결과]\n\n";

            state.selectedCards.forEach((c, i) => {
                const dir = c.reversed ? '역방향 🔄' : '정방향 ✓';
                const cardDiv = document.createElement('div');
                cardDiv.className = 'result-card';
                cardDiv.innerHTML = `<div style="font-size:0.8em; color:#a855f7">#${i+1}</div>
                                     <div style="margin:8px 0; font-weight:bold; font-size:0.9em">${c.name}</div>
                                     <div style="font-size:0.8em; color:#fbcfe8">${dir}</div>`;
                display.appendChild(cardDiv);
                text += `${i+1}. ${c.name} (${dir})\n`;
            });

            document.getElementById('result-text').innerText = text + "\n이 결과를 바탕으로 리딩을 진행해줘!";
            showStage('stage-result');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('result-text').innerText);
            alert('결과가 복사되었습니다!');
        }

        function resetAll() {
            showStage('stage-intro');
            document.getElementById('res-btn').style.display = 'none';
        }

        function showStage(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 드래그 스크롤 로직
        const slider = document.getElementById('viewport');
        let isDown = false; let startX; let scrollLeft;
        slider.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - slider.offsetLeft; scrollLeft = slider.scrollLeft; });
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - slider.offsetLeft; const walk = (x - startX) * 2; slider.scrollLeft = scrollLeft - walk; });
    </script>
</body>
</html>
